<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Финал ЛЧ 2026 — голосование</title>
  <meta name="description" content="Fan poll: кто выиграет финал Лиги чемпионов в Будапеште?" />
  <style>
    :root {
      --arsenal: #EF0107;
      --psg: #004170;
      --gold: #d4a853;
      --bg: #0a0e14;
      --card: #141b26;
      --text: #e8edf4;
      --muted: #8b9bb4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: #05080c;
      min-height: 100vh;
      box-shadow: 0 0 80px rgba(0,0,0,0.5);
    }
    /* Герой: по умолчанию — вертикальный стек (мобильный портрет) */
    .hero-stack {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
      grid-template-areas:
        "arsenal"
        "vs"
        "psg";
    }
    .hero-art--arsenal { grid-area: arsenal; }
    .hero-art--psg { grid-area: psg; }
    .vs-row { grid-area: vs; }
    .img-full {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      background: #05080c;
    }
    .img-wrap { background: #05080c; line-height: 0; position: relative; }
    .side-label {
      position: absolute;
      top: 0.5rem; left: 0.5rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      background: rgba(0,0,0,0.65);
      z-index: 1;
    }
    .side-label.arsenal { color: #ff8a8a; }
    .side-label.psg { color: #8ec5ff; }
    .head {
      text-align: center;
      padding: 1.25rem 1rem 0.5rem;
    }
    .head h4 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .head p { font-size: 1.15rem; font-weight: 700; margin-top: 0.25rem; }
    .vs-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      background: #0a0e14;
    }
    .vs-row::before, .vs-row::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .vs-badge {
      width: 48px; height: 48px;
      background: var(--gold);
      color: #111;
      font-weight: 800;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bar-track {
      height: 8px;
      margin: 0.75rem 1rem 0;
      background: var(--psg);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 50%;
      background: var(--arsenal);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .vote-total {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0 1rem 0.75rem;
    }
    .vote-message {
      margin: 0 1rem 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
      text-align: center;
      background: var(--card);
    }
    .vote-message[hidden] { display: none; }
    .vote-message--warn { border: 1px solid #6b5a2e; color: var(--gold); }
    .vote-message--error { border: 1px solid #6b2e2e; color: #ff8a8a; }
    .vote-message--success { border: 1px solid #2e6b3a; color: #8aff9a; }
    .vote-message--info { border: 1px solid #2e4a6b; color: #8ab4ff; }
    .vote-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      padding: 0 1rem 1.5rem;
    }
    .btn {
      padding: 1rem;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn.is-dimmed { opacity: 0.4; }
    .btn.is-selected { box-shadow: 0 0 0 3px var(--gold); }
    .btn-arsenal { background: var(--arsenal); color: #fff; }
    .btn-psg { background: var(--psg); color: #fff; }
    .footer {
      text-align: center;
      font-size: 0.7rem;
      color: #4a5568;
      padding: 0 1rem 2rem;
    }

    /* Планшет/десктоп: два арта в ряд, VS по центру */
    @media (min-width: 840px) {
      .page {
        max-width: min(1200px, 96vw);
      }
      .head {
        padding: 1.5rem 2rem 1rem;
      }
      .head p { font-size: 1.35rem; }
      .hero-stack {
        grid-template-columns: 1fr auto 1fr;
        grid-template-rows: minmax(200px, auto);
        grid-template-areas: "arsenal vs psg";
        align-items: stretch;
        gap: 0;
        padding: 0 0.5rem;
      }
      .hero-art .img-full {
        width: 100%;
        height: 100%;
        max-height: min(52vh, 520px);
        object-fit: contain;
        object-position: center;
      }
      .hero-art--arsenal .img-full { object-position: center right; }
      .hero-art--psg .img-full { object-position: center left; }
      .vs-row {
        flex-direction: column;
        justify-content: center;
        align-self: stretch;
        padding: 1rem 0.75rem;
        min-width: 72px;
        background: linear-gradient(180deg, #0a0e14 0%, #141b26 50%, #0a0e14 100%);
      }
      .vs-row::before,
      .vs-row::after {
        flex: 1;
        width: 1px;
        height: auto;
        min-height: 24px;
        background: linear-gradient(180deg, transparent, var(--gold), transparent);
      }
      .vs-badge {
        width: 56px;
        height: 56px;
        font-size: 1.1rem;
      }
      .bar-track,
      .stats,
      .vote-total,
      .vote-message,
      .vote-bar,
      .footer {
        max-width: 640px;
        margin-left: auto;
        margin-right: auto;
      }
      .bar-track { width: calc(100% - 2rem); }
      .vote-bar {
        max-width: 480px;
        padding-bottom: 2rem;
      }
    }

    /* Широкий экран, но узкий портрет (телефон) — остаётся вертикаль */
    @media (max-width: 839px) and (orientation: portrait) {
      .hero-stack {
        grid-template-columns: 1fr;
        grid-template-areas:
          "arsenal"
          "vs"
          "psg";
      }
    }
  </style>
</head>
<body>
  <div class="page landing-a" data-vote-root data-vote-poll-id="ucl-final-2026">
    <header class="head">
      <h4>Финал ЛЧ · 30 мая · Будапешт</h4>
      <p>Кто поднимет кубок?</p>
    </header>

    <div class="hero-stack">
      <div class="img-wrap hero-art hero-art--arsenal">
        <span class="side-label arsenal">Arsenal</span>
        <img class="img-full" src="assets/arsenal.png" alt="Arsenal" width="1536" height="1024" />
      </div>
      <div class="vs-row" aria-hidden="true"><span class="vs-badge">VS</span></div>
      <div class="img-wrap hero-art hero-art--psg">
        <span class="side-label psg">Paris SG</span>
        <img class="img-full" src="assets/psg.png" alt="PSG" width="1536" height="1024" />
      </div>
    </div>

    <div class="bar-track"><div class="bar-fill" data-vote-bar-fill></div></div>
    <div class="stats">
      <span data-vote-stat-arsenal>Arsenal —%</span>
      <span data-vote-stat-psg>PSG —%</span>
    </div>
    <p class="vote-total" data-vote-total>… голосов · обновляется live</p>
    <p class="vote-message" data-vote-message hidden></p>

    <div class="vote-bar">
      <button type="button" class="btn btn-arsenal" data-vote-choice="arsenal">Arsenal</button>
      <button type="button" class="btn btn-psg" data-vote-choice="psg">PSG</button>
    </div>

    <p class="footer">Неофициальный фан-опрос · не связан с УЕФА</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/vote.js"></script>
</body>
</html>
